spring.application.name=muscleyn-backend

server.port=8081

spring.datasource.url=jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:muscleyn}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

app.cors.allowed-origins=*

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


file.upload-dir=${UPLOAD_DIR:uploads/products}

jwt.secret=muscleynSecretKeyMuscleynSecretKey123456
jwt.expiration=86400000

razorpay.key.id=YOUR_KEY_ID
razorpay.key.secret=YOUR_SECRET

# Contact enquiry email notifications
contact.email.notifications.enabled=false
contact.email.to=
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true